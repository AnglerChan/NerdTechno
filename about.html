  <script>
    (function () {
      const nav = document.querySelector(".site-nav");
      const bar = document.querySelector(".accent-bar");
      if (!nav || !bar) return;

      const updateNavPosition = () => {
        const navRect = nav.getBoundingClientRect();
        const barRect = bar.getBoundingClientRect();
        const inAccent = navRect.bottom > barRect.top && navRect.top < barRect.bottom;
        nav.classList.toggle("on-accent", inAccent);
      };

      updateNavPosition();
      window.addEventListener("scroll", updateNavPosition, { passive: true });
      window.addEventListener("resize", updateNavPosition);
    })();

    (function () {
      const cursor = document.querySelector(".dot-cursor");
      if (!cursor) return;
      const supportsFinePointer = window.matchMedia("(hover: hover) and (pointer: fine)").matches;
      if (!supportsFinePointer) return;

      document.body.classList.add("custom-cursor");

      const moveCursor = (event) => {
        cursor.style.left = `${Math.round(event.clientX)}px`;
        cursor.style.top = `${Math.round(event.clientY)}px`;
      };

      const setCursorHoverState = (event) => {
        const interactive = event.target.closest("a, button, [role='button']");
        const modelStage = event.target.closest(".about-model-stage");
        document.body.classList.toggle("cursor-hover", Boolean(interactive));
        document.body.classList.toggle("cursor-model", Boolean(modelStage));
      };

      window.addEventListener("pointermove", moveCursor, { passive: true });
      window.addEventListener("pointerdown", (event) => {
        moveCursor(event);
        document.body.classList.add("cursor-press");
      }, { passive: true });
      window.addEventListener("pointerup", () => {
        document.body.classList.remove("cursor-press");
      }, { passive: true });
      window.addEventListener("pointercancel", () => {
        document.body.classList.remove("cursor-press");
      }, { passive: true });
      window.addEventListener("pointerover", setCursorHoverState, { passive: true });
      window.addEventListener("pointerout", setCursorHoverState, { passive: true });
      window.addEventListener("blur", () => {
        document.body.classList.remove("cursor-press");
      });
    })();

    (function () {
      const mark = document.querySelector(".studio-mark");
      if (!mark) return;

      const text = mark.textContent || "";
      const chars = [];
      const frag = document.createDocumentFragment();

      for (let i = 0; i < text.length; i += 1) {
        const ch = text[i];
        const span = document.createElement("span");
        span.className = ch === " " ? "mark-char mark-space" : "mark-char";
        span.style.setProperty("--char-index", String(i));
        span.textContent = ch === " " ? "\u00A0" : ch;
        chars.push(span);
        frag.appendChild(span);
      }

      mark.textContent = "";
      mark.appendChild(frag);

      const fontClasses = ["font-a", "font-b", "font-c", "font-d"];
      const staggerStep = 36;
      const cycleGap = 1300;

      const runCycle = () => {
        chars.forEach((charEl, index) => {
          if (charEl.classList.contains("mark-space")) return;
          window.setTimeout(() => {
            charEl.classList.remove("font-a", "font-b", "font-c", "font-d");
            const fontClass = fontClasses[Math.floor(Math.random() * fontClasses.length)];
            charEl.classList.add(fontClass);
          }, index * staggerStep);
        });
      };

      runCycle();
      window.setInterval(runCycle, cycleGap);
    })();

    (function () {
      const visual = document.querySelector(".hero-visual");
      const svg = document.querySelector(".hero-logo-svg");
      const typerLayer = document.querySelector(".typer-layer");
      if (!visual || !svg) return;

      const blocks = Array.from(svg.querySelectorAll(".floating-block"));
      if (blocks.length === 0) return;

      const prefersReducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      if (prefersReducedMotion) return;

      const supportsFinePointer = window.matchMedia("(hover: hover) and (pointer: fine)").matches;

      const states = blocks.map((el, index) => ({
        el,
        index,
        x: 0,
        y: 0,
        r: 0,
        vx: 0,
        vy: 0,
        vr: 0,
        cx: 0,
        cy: 0,
        radius: 0,
        fx: 0.22 + index * 0.027,
        fy: 0.18 + index * 0.023,
        fr: 0.14 + index * 0.019,
        ax: 12 + (index % 3) * 5,
        ay: 8 + (index % 2) * 4,
        ar: 0.55 + (index % 4) * 0.12,
        px: index * 0.93,
        py: index * 1.27,
        pr: index * 0.61,
        floorY: 0,
        s: 1,
        vs: 0,
        targetS: 1,
        scaleTimer: 0,
        clicks: 0,
        isDropped: false,
        dropThreshold: Math.floor(Math.random() * 10) + 1
      }));
      const stateByEl = new Map(states.map((state) => [state.el, state]));
      const viewBox = svg.viewBox.baseVal;
      const typeText = "© 2026 nerdtechno";
      const snakes = [];
      let spawnTimer = 0;
      const maxActiveSnakes = 1;

      const refreshBounds = () => {
        const viewHeight = svg.viewBox.baseVal.height || 2713;
        const floorPadding = 28;

        states.forEach((state) => {
          const box = state.el.getBBox();
          state.boxX = box.x;
          state.boxY = box.y;
          state.boxW = box.width;
          state.boxH = box.height;
          state.cx = box.x + box.width * 0.5;
          state.cy = box.y + box.height * 0.5;
          state.radius = Math.max(box.width, box.height) * 0.5;
          state.floorY = viewHeight - floorPadding - (box.y + box.height);

          const shape = state.el.querySelector("path, circle, rect, polygon");
          if (!shape) {
            state.track = null;
            return;
          }

          if (shape instanceof SVGPathElement) {
            const len = shape.getTotalLength();
            const samples = [];
            const sampleCount = 80;
            for (let i = 0; i < sampleCount; i += 1) {
              const p = shape.getPointAtLength((len * i) / sampleCount);
              samples.push(p);
            }

            let area = 0;
            for (let i = 0; i < samples.length; i += 1) {
              const a = samples[i];
              const b = samples[(i + 1) % samples.length];
              area += a.x * b.y - b.x * a.y;
            }

            state.track = {
              kind: "path",
              shape,
              length: len,
              orientation: area >= 0 ? 1 : -1
            };
            return;
          }

          if (shape instanceof SVGCircleElement) {
            const cx = Number(shape.getAttribute("cx") || 0);
            const cy = Number(shape.getAttribute("cy") || 0);
            const r = Number(shape.getAttribute("r") || 1);
            state.track = {
              kind: "circle",
              cx,
              cy,
              r,
              length: Math.PI * 2 * r,
              orientation: 1
            };
            return;
          }

          state.track = null;
        });
      };

      const toSvgPoint = (clientX, clientY) => {
        const matrix = svg.getScreenCTM();
        if (!matrix) return null;
        const point = new DOMPoint(clientX, clientY).matrixTransform(matrix.inverse());
        return point;
      };

      const applyPointerImpulse = (clientX, clientY) => {
        const point = toSvgPoint(clientX, clientY);
        if (!point) return;

        states.forEach((state) => {
          if (state.isDropped) return;
          const dx = state.cx - point.x;
          const dy = state.cy - point.y;
          const dist = Math.hypot(dx, dy) || 1;
          const reach = state.radius + 920;
          if (dist >= reach) return;

          const t = 1 - dist / reach;
          const nx = dx / dist;
          const ny = dy / dist;
          const impulse = t * 0.62;

          state.vx += nx * impulse;
          state.vy += ny * impulse;
          state.vr += (nx * 0.18 - ny * 0.1) * t;
        });
      };

      const triggerScale = (state) => {
        state.targetS = 1.12;
        window.clearTimeout(state.scaleTimer);
        state.scaleTimer = window.setTimeout(() => {
          state.targetS = 1;
        }, 170);
      };

      const dropState = (state) => {
        state.isDropped = true;
        state.vy += 0.8 + Math.random() * 0.6;
        state.vx += (Math.random() - 0.5) * 1.2;
        state.vr += (Math.random() - 0.5) * 0.7;
      };

      const svgToLayer = (sx, sy) => {
        const svgRect = svg.getBoundingClientRect();
        const layerRect = typerLayer ? typerLayer.getBoundingClientRect() : svgRect;
        const x = ((sx - viewBox.x) / viewBox.width) * svgRect.width + (svgRect.left - layerRect.left);
        const y = ((sy - viewBox.y) / viewBox.height) * svgRect.height + (svgRect.top - layerRect.top);
        return { x, y };
      };

      const sampleTrack = (track, lengthPos) => {
        if (!track) return null;

        if (track.kind === "path") {
          const len = track.length;
          const s = ((lengthPos % len) + len) % len;
          const eps = Math.max(2, Math.min(12, len / 240));
          const p = track.shape.getPointAtLength(s);
          const p1 = track.shape.getPointAtLength(((s + eps) % len + len) % len);
          const tx = p1.x - p.x;
          const ty = p1.y - p.y;
          const tlen = Math.hypot(tx, ty) || 1;
          const ux = tx / tlen;
          const uy = ty / tlen;
          const leftNx = -uy;
          const leftNy = ux;
          const outwardX = track.orientation > 0 ? uy : leftNx;
          const outwardY = track.orientation > 0 ? -ux : leftNy;
          return { x: p.x, y: p.y, nx: outwardX, ny: outwardY, tx: ux, ty: uy };
        }

        if (track.kind === "circle") {
          const s = ((lengthPos % track.length) + track.length) % track.length;
          const a = (s / track.length) * Math.PI * 2;
          const cosA = Math.cos(a);
          const sinA = Math.sin(a);
          return { x: track.cx + cosA * track.r, y: track.cy + sinA * track.r, nx: cosA, ny: sinA, tx: -sinA, ty: cosA };
        }

        return null;
      };

      const createSnake = () => {
        if (!typerLayer) return;
        if (snakes.length >= maxActiveSnakes) return;
        const candidates = states.filter((state) => !state.isDropped && state.track);
        if (candidates.length === 0) return;

        const state = candidates[Math.floor(Math.random() * candidates.length)];
        const wrapper = document.createElement("div");
        wrapper.className = "typer-snake";
        typerLayer.appendChild(wrapper);

        const chars = typeText.split("").map((ch) => {
          const span = document.createElement("span");
          span.className = "typer-char";
          span.textContent = ch === " " ? "\u00A0" : ch;
          wrapper.appendChild(span);
          return span;
        });

        const firstChar = chars[0];
        const fontSizePx = firstChar ? parseFloat(window.getComputedStyle(firstChar).fontSize || "14") : 14;
        const svgRect = svg.getBoundingClientRect();
        const viewUnitsPerPx = svgRect.width > 0 ? viewBox.width / svgRect.width : 1;
        const charSpacing = fontSizePx * 0.62 * viewUnitsPerPx;
        const fontSizeView = fontSizePx * viewUnitsPerPx;

        snakes.push({
          state,
          wrapper,
          chars,
          pathPos: Math.random() * state.track.length - (chars.length * charSpacing) / 2,
          speed: 12 + Math.random() * 8,
          spacing: charSpacing,
          // Keep glyphs outside the shape by offsetting roughly one glyph height outward.
          offset: fontSizeView * (0.2 + Math.random() * 0.2),
          typed: 0,
          phase: "in",
          holdUntil: 0
        });
      };

      const scheduleTypedTag = () => {
        createSnake();
        spawnTimer = window.setTimeout(scheduleTypedTag, 2800 + Math.random() * 2200);
      };

      const updateSnakes = (dtMs, nowMs) => {
        const dt = dtMs / 1000;

        for (let i = snakes.length - 1; i >= 0; i -= 1) {
          const snake = snakes[i];
          const state = snake.state;
          if (!state.track || state.isDropped) {
            snake.wrapper.remove();
            snakes.splice(i, 1);
            continue;
          }

          snake.pathPos += snake.speed * dt;
          if (snake.phase === "in") {
            snake.typed += dtMs / 118;
            if (snake.typed >= snake.chars.length) {
              snake.typed = snake.chars.length;
              snake.phase = "hold";
              snake.holdUntil = nowMs + 2200 + Math.random() * 1800;
            }
          } else if (snake.phase === "hold") {
            if (nowMs >= snake.holdUntil) snake.phase = "out";
          } else if (snake.phase === "out") {
            snake.typed -= dtMs / 118;
            if (snake.typed <= 0) {
              snake.wrapper.remove();
              snakes.splice(i, 1);
              continue;
            }
          }

          const visible = Math.max(0, Math.min(snake.chars.length, Math.floor(snake.typed)));
          const isOutPhase = snake.phase === "out";
          const visibleStart = isOutPhase ? snake.chars.length - visible : 0;
          const visibleEnd = isOutPhase ? snake.chars.length : visible;
          snake.wrapper.style.opacity = "1";

          for (let c = 0; c < snake.chars.length; c += 1) {
            const charEl = snake.chars[c];
            if (c < visibleStart || c >= visibleEnd) {
              charEl.style.opacity = "0";
              continue;
            }

            const sample = sampleTrack(state.track, snake.pathPos + c * snake.spacing);
            if (!sample) {
              charEl.style.opacity = "0";
              continue;
            }

            const rad = (state.r * Math.PI) / 180;
            const cosR = Math.cos(rad);
            const sinR = Math.sin(rad);

            const localDx = (sample.x - state.cx) * state.s;
            const localDy = (sample.y - state.cy) * state.s;
            const tx = state.cx + localDx * cosR - localDy * sinR + state.x;
            const ty = state.cy + localDx * sinR + localDy * cosR + state.y;

            let nx = sample.nx * cosR - sample.ny * sinR;
            let ny = sample.nx * sinR + sample.ny * cosR;

            const sx = tx + nx * snake.offset * state.s;
            const sy = ty + ny * snake.offset * state.s;
            const pos = svgToLayer(sx, sy);
            // Rotate each glyph so its "top" points to the outward normal direction.
            const angle = (Math.atan2(ny, nx) * 180) / Math.PI + 90;
            charEl.style.opacity = "1";
            charEl.style.left = `${pos.x.toFixed(2)}px`;
            charEl.style.top = `${pos.y.toFixed(2)}px`;
            charEl.style.transform = `translate(-50%, -50%) rotate(${angle.toFixed(2)}deg)`;
          }
        }
      };

      const start = performance.now();
      const spring = 0.037;
      const springR = 0.032;
      const damping = 0.9;
      const dampingR = 0.88;
      const gravity = 0.82;
      const bounce = 0.26;
      const floorFriction = 0.86;
      let prevNow = performance.now();

      const animate = (now) => {
        const time = (now - start) * 0.001;
        const dtMs = Math.min(40, now - prevNow);
        prevNow = now;

        states.forEach((state) => {
          if (!state.isDropped) {
            const targetX = Math.sin(time * state.fx + state.px) * state.ax;
            const targetY = Math.cos(time * state.fy + state.py) * state.ay;
            const targetR = Math.sin(time * state.fr + state.pr) * state.ar;

            state.vx += (targetX - state.x) * spring;
            state.vy += (targetY - state.y) * spring;
            state.vr += (targetR - state.r) * springR;

            state.vx *= damping;
            state.vy *= damping;
            state.vr *= dampingR;

            state.x += state.vx;
            state.y += state.vy;
            state.r += state.vr;
          } else {
            state.vy += gravity;
            state.vx *= 0.996;
            state.vr *= 0.992;

            state.x += state.vx;
            state.y += state.vy;
            state.r += state.vr;

            if (state.y > state.floorY) {
              state.y = state.floorY;
              if (Math.abs(state.vy) > 0.18) {
                state.vy *= -bounce;
                state.vx *= floorFriction;
                state.vr *= 0.9;
              } else {
                state.vy = 0;
                state.vx *= 0.9;
                if (Math.abs(state.vx) < 0.02) state.vx = 0;
                if (Math.abs(state.vr) < 0.02) state.vr = 0;
              }
            }
          }

          state.vs += (state.targetS - state.s) * 0.24;
          state.vs *= 0.72;
          state.s += state.vs;

          state.el.style.transform = `translate(${state.x.toFixed(2)}px, ${state.y.toFixed(2)}px) rotate(${state.r.toFixed(2)}deg) scale(${state.s.toFixed(3)})`;
        });

        updateSnakes(dtMs, now);

        window.requestAnimationFrame(animate);
      };

      refreshBounds();
      window.addEventListener("resize", refreshBounds);

      if (supportsFinePointer) {
        visual.addEventListener("pointerenter", (event) => {
          applyPointerImpulse(event.clientX, event.clientY);
        });

        visual.addEventListener("pointermove", (event) => {
          applyPointerImpulse(event.clientX, event.clientY);
        }, { passive: true });
      }

      scheduleTypedTag();

      visual.addEventListener("click", (event) => {
        if (!(event.target instanceof Element)) return;
        const blockEl = event.target.closest(".floating-block");
        if (!blockEl) return;

          const state = stateByEl.get(blockEl);
          if (!state) return;

          triggerScale(state);
          if (!state.isDropped) {
            state.vy -= 0.55;
            state.vr += (Math.random() - 0.5) * 0.45;
          }

          state.clicks += 1;
          if (state.clicks >= state.dropThreshold && !state.isDropped) {
            dropState(state);
          }
      });

      window.requestAnimationFrame(animate);
    })();

  </script>
  <script>
    (function () {
      const cards = Array.from(document.querySelectorAll(".about-model-card"));
      if (cards.length === 0) return;

      let active = null;
      const durationMs = 680;

      const px = (value) => `${Math.round(value)}px`;
      const clamp = (value, min, max) => Math.min(max, Math.max(min, value));

      const buildExpandedState = (card) => {
        const stage = card.querySelector(".about-model-stage");
        const title = card.querySelector(".about-title");
        if (!stage || !title) return null;

        const cardRect = card.getBoundingClientRect();
        const titleRect = title.getBoundingClientRect();
        const stageRect = stage.getBoundingClientRect();

        const overlay = document.createElement("div");
        overlay.className = "about-expand-overlay";
        const shell = document.createElement("div");
        shell.className = "about-expand-shell";
        const titleEl = document.createElement("h2");
        titleEl.className = "about-expand-title";
        titleEl.innerHTML = title.innerHTML;
        const modelBox = document.createElement("div");
        modelBox.className = "about-expand-model";

        shell.appendChild(titleEl);
        shell.appendChild(modelBox);
        overlay.appendChild(shell);

        const start = {
          shellTop: cardRect.top,
          shellLeft: cardRect.left,
          shellWidth: cardRect.width,
          shellHeight: cardRect.height,
          titleTop: titleRect.top - cardRect.top,
          titleLeft: titleRect.left - cardRect.left,
          titleSize: parseFloat(window.getComputedStyle(title).fontSize || "40"),
          modelTop: stageRect.top - cardRect.top,
          modelLeft: stageRect.left - cardRect.left,
          modelWidth: stageRect.width,
          modelHeight: stageRect.height
        };

        const pad = clamp(window.innerWidth * 0.024, 18, 38);
        const endModelWidth = clamp(window.innerWidth * 0.42, 260, 760);
        const end = {
          shellTop: 0,
          shellLeft: 0,
          shellWidth: window.innerWidth,
          shellHeight: window.innerHeight,
          titleTop: pad,
          titleLeft: pad,
          titleSize: clamp(window.innerWidth * 0.12, 78, 220),
          modelTop: 0,
          modelLeft: window.innerWidth - endModelWidth,
          modelWidth: endModelWidth,
          modelHeight: window.innerHeight
        };

        return { stage, overlay, shell, titleEl, modelBox, start, end };
      };

      const applyState = (state, target) => {
        const data = state[target];
        state.shell.style.top = px(data.shellTop);
        state.shell.style.left = px(data.shellLeft);
        state.shell.style.width = px(data.shellWidth);
        state.shell.style.height = px(data.shellHeight);
        state.titleEl.style.top = px(data.titleTop);
        state.titleEl.style.left = px(data.titleLeft);
        state.titleEl.style.fontSize = px(data.titleSize);
        state.modelBox.style.top = px(data.modelTop);
        state.modelBox.style.left = px(data.modelLeft);
        state.modelBox.style.width = px(data.modelWidth);
        state.modelBox.style.height = px(data.modelHeight);
      };

      const closeExpanded = () => {
        if (!active || active.isClosing) return;
        active.isClosing = true;
        applyState(active, "start");
        window.dispatchEvent(new CustomEvent("about-model-expand", {
          detail: { expanded: false, duration: durationMs, stageId: active.stage.id }
        }));
        window.dispatchEvent(new Event("resize"));

        window.setTimeout(() => {
          if (!active) return;
          const { stage, stageParent, stageNext, overlay, onEsc } = active;
          if (stageParent) {
            if (stageNext && stageNext.parentNode === stageParent) {
              stageParent.insertBefore(stage, stageNext);
            } else {
              stageParent.appendChild(stage);
            }
          }
          overlay.remove();
          window.removeEventListener("keydown", onEsc);
          document.body.classList.remove("about-expand-lock");
          window.dispatchEvent(new Event("resize"));
          active = null;
        }, durationMs + 30);
      };

      cards.forEach((card) => {
        card.addEventListener("click", (event) => {
          if (!(event.target instanceof Element)) return;
          if (active) return;

          const state = buildExpandedState(card);
          if (!state) return;

          const stageParent = state.stage.parentElement;
          const stageNext = state.stage.nextSibling;
          const onEsc = (keyEvent) => {
            if (keyEvent.key === "Escape") closeExpanded();
          };

          document.body.appendChild(state.overlay);
          state.modelBox.appendChild(state.stage);
          applyState(state, "start");
          document.body.classList.add("about-expand-lock");
          window.addEventListener("keydown", onEsc);

          state.overlay.addEventListener("click", (overlayEvent) => {
            if (overlayEvent.target === state.overlay) closeExpanded();
          });

          state.shell.addEventListener("click", (shellEvent) => {
            if (shellEvent.target === state.shell) closeExpanded();
          });

          active = {
            ...state,
            stageParent,
            stageNext,
            onEsc,
            isClosing: false
          };

          window.requestAnimationFrame(() => {
            if (!active) return;
            applyState(active, "end");
            window.dispatchEvent(new CustomEvent("about-model-expand", {
              detail: { expanded: true, duration: durationMs, stageId: active.stage.id }
            }));
            window.dispatchEvent(new Event("resize"));
          });
        });
      });
    })();
  </script>
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.162.0/examples/jsm/"
      }
    }
  </script>
  <script type="module">
    (async () => {
      const modelConfigs = [
        {
          stageId: "haoxiang-model-stage",
          idleUrl: "./assets/models/Haoxiang_standing.fbx",
          moveUrl: "./assets/models/Haoxiang_dancing.fbx"
        },
        {
          stageId: "haocheng-model-stage",
          idleUrl: "./assets/models/Haocheng_walking.fbx",
          moveUrl: "./assets/models/Haocheng_dancing.fbx"
        }
      ];
      const activeConfigs = modelConfigs.filter((config) => document.querySelector(`#${config.stageId}`));
      if (activeConfigs.length === 0) return;

      const [THREE, { OrbitControls }, { FBXLoader }] = await Promise.all([
        import("three"),
        import("three/addons/controls/OrbitControls.js"),
        import("three/addons/loaders/FBXLoader.js")
      ]);

      const disposers = [];

      const initModelViewer = async (config) => {
        const stage = document.querySelector(`#${config.stageId}`);
        if (!stage) return null;

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(34, 1, 0.1, 1200);
        camera.position.set(0, 74, 190);

        const renderer = new THREE.WebGLRenderer({
          antialias: true,
          alpha: true,
          powerPreference: "high-performance"
        });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        renderer.setClearColor(0x000000, 0);
        stage.appendChild(renderer.domElement);

        const hemiLight = new THREE.HemisphereLight(0xffffff, 0x5f5f5f, 1.2);
        const keyLight = new THREE.DirectionalLight(0xffffff, 1.3);
        keyLight.position.set(100, 150, 90);
        scene.add(hemiLight, keyLight);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enablePan = false;
        controls.enableZoom = false;
        controls.enableDamping = true;
        controls.dampingFactor = 0.08;
        controls.rotateSpeed = 0.66;
        controls.minPolarAngle = Math.PI * 0.24;
        controls.maxPolarAngle = Math.PI * 0.78;
        controls.target.set(0, 64, 0);
        controls.update();

        const resize = () => {
          const width = stage.clientWidth || 1;
          const height = stage.clientHeight || 1;
          camera.aspect = width / height;
          camera.updateProjectionMatrix();
          renderer.setSize(width, height, false);
        };

        const resizeObserver = new ResizeObserver(resize);
        resizeObserver.observe(stage);
        resize();

        const modelCard = stage.closest(".about-model-card");
        let disposed = false;
        const clock = new THREE.Clock();
        const raycaster = new THREE.Raycaster();
        const pointerNdc = new THREE.Vector2();
        let pointerDownPoint = null;
        let modelRoot = null;
        let mixer = null;
        let currentAnimation = "idle";
        const actions = {
          idle: null,
          move: null
        };
        let expandState = {
          active: false,
          startAt: 0,
          duration: 680,
          fromPos: null,
          fromTarget: null,
          toPos: null,
          toTarget: null
        };
        let baseView = {
          pos: null,
          target: null
        };
        let expandedView = {
          pos: null,
          target: null
        };

        const animate = (now = performance.now()) => {
          if (disposed) return;
          if (expandState.active && expandState.fromPos && expandState.toPos && expandState.fromTarget && expandState.toTarget) {
            const t = Math.min(1, Math.max(0, (now - expandState.startAt) / expandState.duration));
            camera.position.lerpVectors(expandState.fromPos, expandState.toPos, t);
            controls.target.lerpVectors(expandState.fromTarget, expandState.toTarget, t);
            if (t >= 1) expandState.active = false;
          }
          const delta = Math.min(clock.getDelta(), 0.05);
          if (mixer) mixer.update(delta);
          controls.update();
          renderer.render(scene, camera);
          window.requestAnimationFrame(animate);
        };

        const beginExpandTransition = (expanded, duration) => {
          if (!baseView.pos || !baseView.target || !expandedView.pos || !expandedView.target) return;
          expandState = {
            active: true,
            startAt: performance.now(),
            duration: Math.max(80, duration || 680),
            fromPos: camera.position.clone(),
            fromTarget: controls.target.clone(),
            toPos: expanded ? expandedView.pos.clone() : baseView.pos.clone(),
            toTarget: expanded ? expandedView.target.clone() : baseView.target.clone()
          };
        };

        const loader = new FBXLoader();
        const slashIndex = config.idleUrl.lastIndexOf("/");
        const modelDir = slashIndex >= 0 ? config.idleUrl.slice(0, slashIndex + 1) : "./assets/models/";
        loader.setResourcePath(`${modelDir}mesh_animate.fbm/`);
        const loadFbx = (url) => new Promise((resolve, reject) => {
          loader.load(url, resolve, undefined, reject);
        });

        const playAnimation = (name) => {
          const next = actions[name];
          if (!next) return;
          if (currentAnimation === name && next.isRunning()) return;

          const prev = actions[currentAnimation];
          if (prev && prev !== next) prev.fadeOut(0.14);

          next.reset();
          next.enabled = true;
          next.setLoop(THREE.LoopPingPong, Infinity);
          next.fadeIn(0.14);
          next.play();
          currentAnimation = name;
        };

        const pickModelHit = (event) => {
          if (!modelRoot) return false;
          const rect = renderer.domElement.getBoundingClientRect();
          if (rect.width <= 0 || rect.height <= 0) return false;
          pointerNdc.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
          pointerNdc.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
          raycaster.setFromCamera(pointerNdc, camera);
          return raycaster.intersectObject(modelRoot, true).length > 0;
        };

        const onCanvasPointerDown = (event) => {
          pointerDownPoint = { x: event.clientX, y: event.clientY };
        };

        const onCanvasClick = (event) => {
          if (!actions.idle || !actions.move) return;
          if (!pointerDownPoint) return;
          const move = Math.hypot(event.clientX - pointerDownPoint.x, event.clientY - pointerDownPoint.y);
          pointerDownPoint = null;
          if (move > 6) return;
          if (!pickModelHit(event)) return;
          playAnimation(currentAnimation === "idle" ? "move" : "idle");
        };

        const onCardPointerEnter = () => {
          playAnimation("move");
        };

        const onCardPointerLeave = () => {
          playAnimation("idle");
        };

        renderer.domElement.addEventListener("pointerdown", onCanvasPointerDown, { passive: true });
        renderer.domElement.addEventListener("click", onCanvasClick);
        if (modelCard) {
          modelCard.addEventListener("pointerenter", onCardPointerEnter);
          modelCard.addEventListener("pointerleave", onCardPointerLeave);
        }

        try {
          const [idleFbx, moveFbx] = await Promise.all([
            loadFbx(config.idleUrl),
            loadFbx(config.moveUrl).catch(() => null)
          ]);

          idleFbx.traverse((child) => {
            if (!child.isMesh) return;
            child.castShadow = false;
            child.receiveShadow = false;
          });

          const baseBox = new THREE.Box3().setFromObject(idleFbx);
          const baseSize = baseBox.getSize(new THREE.Vector3());
          const maxDim = Math.max(baseSize.x, baseSize.y, baseSize.z) || 1;
          const scale = (132 / (baseSize.y || maxDim)) * 0.5;
          idleFbx.scale.setScalar(scale);

          const fittedBox = new THREE.Box3().setFromObject(idleFbx);
          const center = fittedBox.getCenter(new THREE.Vector3());
          idleFbx.position.set(-center.x, -fittedBox.min.y, -center.z);
          scene.add(idleFbx);
          modelRoot = idleFbx;

          const finalBox = new THREE.Box3().setFromObject(idleFbx);
          const finalSize = finalBox.getSize(new THREE.Vector3());
          controls.target.set(0, finalSize.y * 0.56, 0);
          camera.position.set(0, finalSize.y * 0.72 + 10, Math.max(140, finalSize.z * 2.45));
          camera.lookAt(controls.target);
          controls.update();
          baseView = {
            pos: camera.position.clone(),
            target: controls.target.clone()
          };
          expandedView = {
            pos: new THREE.Vector3(
              baseView.pos.x,
              baseView.pos.y + finalSize.y * 0.08,
              Math.max(80, baseView.pos.z * 0.62)
            ),
            target: new THREE.Vector3(
              baseView.target.x,
              baseView.target.y + finalSize.y * 0.06,
              baseView.target.z
            )
          };

          mixer = new THREE.AnimationMixer(idleFbx);
          if (idleFbx.animations && idleFbx.animations.length > 0) {
            actions.idle = mixer.clipAction(idleFbx.animations[0]);
          }
          if (moveFbx && moveFbx.animations && moveFbx.animations.length > 0) {
            actions.move = mixer.clipAction(moveFbx.animations[0]);
          }

          playAnimation("idle");
          stage.classList.add("is-ready");
        } catch (error) {
          stage.classList.add("is-model-error");
        }

        const onExpandEvent = (event) => {
          const detail = event.detail || {};
          if (detail.stageId !== config.stageId) return;
          beginExpandTransition(Boolean(detail.expanded), Number(detail.duration) || 680);
        };
        window.addEventListener("about-model-expand", onExpandEvent);

        const disposeViewer = () => {
          disposed = true;
          resizeObserver.disconnect();
          window.removeEventListener("about-model-expand", onExpandEvent);
          renderer.domElement.removeEventListener("pointerdown", onCanvasPointerDown);
          renderer.domElement.removeEventListener("click", onCanvasClick);
          if (modelCard) {
            modelCard.removeEventListener("pointerenter", onCardPointerEnter);
            modelCard.removeEventListener("pointerleave", onCardPointerLeave);
          }
          Object.values(actions).forEach((action) => {
            if (!action) return;
            action.stop();
          });
          controls.dispose();
          renderer.dispose();
        };

        animate();
        return disposeViewer;
      };

      const initResults = await Promise.all(activeConfigs.map((config) => initModelViewer(config)));
      initResults.forEach((dispose) => {
        if (typeof dispose === "function") disposers.push(dispose);
      });

      window.addEventListener("beforeunload", () => {
        disposers.forEach((dispose) => dispose());
      }, { once: true });
    })();
  </script>
</body>
</html>
