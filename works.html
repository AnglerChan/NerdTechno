          <span class="works-item-title">01 ATLAS</span>

        <div class="works-item">

  <div class="dot-cursor" aria-hidden="true">
    <svg class="dot-cursor-svg" viewBox="0 0 100 100" focusable="false" aria-hidden="true">
      <circle class="dot-cursor-ring" cx="50" cy="50" r="44" />
    </svg>
  </div>
  <div class="works-interaction-lock" aria-hidden="true"></div>
  <div class="works-blackout-layer" aria-hidden="true">
    <button class="works-blackout-back" type="button" aria-label="Back to works list">
      <svg viewBox="0 0 100 1000" role="img" aria-hidden="true" focusable="false" preserveAspectRatio="none">
        <path class="works-blackout-chevron" d="M84 8 L14 500 L84 992" />
        <rect class="works-blackout-dash" x="36" y="496" width="34" height="8" />
      </svg>
    </button>
  </div>

  <script>
    (function () {
      const nav = document.querySelector(".site-nav");
      const bar = document.querySelector(".accent-bar");
      if (!nav || !bar) return;

      const updateNavPosition = () => {
        const navRect = nav.getBoundingClientRect();
        const barRect = bar.getBoundingClientRect();
        const inAccent = navRect.bottom > barRect.top && navRect.top < barRect.bottom;
        nav.classList.toggle("on-accent", inAccent);
      };

      updateNavPosition();
      window.addEventListener("scroll", updateNavPosition, { passive: true });
      window.addEventListener("resize", updateNavPosition);
    })();

    (function () {
      const cursor = document.querySelector(".dot-cursor");
      if (!cursor) return;
      const supportsFinePointer = window.matchMedia("(hover: hover) and (pointer: fine)").matches;
      if (!supportsFinePointer) return;

      document.body.classList.add("custom-cursor");

      const moveCursor = (event) => {
        cursor.style.left = `${Math.round(event.clientX)}px`;
        cursor.style.top = `${Math.round(event.clientY)}px`;
      };

      const setCursorHoverState = (event) => {
        const interactive = event.target.closest("a, button, [role='button']");
        const modelStage = event.target.closest("#haocheng-model-stage");
        document.body.classList.toggle("cursor-hover", Boolean(interactive));
        document.body.classList.toggle("cursor-model", Boolean(modelStage));
      };

      window.addEventListener("pointermove", moveCursor, { passive: true });
      window.addEventListener("pointerdown", (event) => {
        moveCursor(event);
        document.body.classList.add("cursor-press");
      }, { passive: true });
      window.addEventListener("pointerup", () => {
        document.body.classList.remove("cursor-press");
      }, { passive: true });
      window.addEventListener("pointercancel", () => {
        document.body.classList.remove("cursor-press");
      }, { passive: true });
      window.addEventListener("pointerover", setCursorHoverState, { passive: true });
      window.addEventListener("pointerout", setCursorHoverState, { passive: true });
      window.addEventListener("blur", () => {
        document.body.classList.remove("cursor-press");
      });
    })();

    (function () {
      const shell = document.querySelector(".works-shell");
      const heroVisual = document.querySelector(".hero-visual");
      const heroFillLayer = document.querySelector(".hero-fill-layer");
      const blackoutLayer = document.querySelector(".works-blackout-layer");
      const interactionLock = document.querySelector(".works-interaction-lock");
      const blackoutBack = blackoutLayer?.querySelector(".works-blackout-back");
      if (!shell) return;

      const items = Array.from(shell.querySelectorAll(".works-item"));
      if (items.length === 0) return;

      const prefersReducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      const timers = [];
      let animating = false;
      let isLocked = false;
      let keyBlockBound = false;
      const heroTypingStagger = prefersReducedMotion ? 0 : 14;
      const heroTypingRandomDelayRange = prefersReducedMotion ? 0 : 88;
      const heroTypingDurationBase = prefersReducedMotion ? 0 : 620;
      const heroTypingDurationRange = prefersReducedMotion ? 0 : 360;
      const worksTypingStagger = prefersReducedMotion ? 0 : 4;
      const worksTypingRandomDelayRange = prefersReducedMotion ? 0 : 12;
      const worksTypingDurationBase = prefersReducedMotion ? 0 : 150;
      const worksTypingDurationRange = prefersReducedMotion ? 0 : 70;

      const blockInput = (event) => {
        event.preventDefault();
        event.stopPropagation();
      };

      const clearTimers = () => {
        while (timers.length > 0) {
          window.clearTimeout(timers.pop());
        }
      };

      const pushTimer = (callback, ms) => {
        const id = window.setTimeout(callback, ms);
        timers.push(id);
      };

      const estimateChars = (widthPx, fontPx) => {
        const charWidth = Math.max(7, fontPx * 0.53);
        return Math.ceil(widthPx / charWidth) + 28;
      };

      const buildNoisyToken = (token, dropRate) => {
        if (dropRate <= 0) return token;
        let out = "";
        let kept = 0;

        for (let i = 0; i < token.length; i += 1) {
          const ch = token[i];
          if (ch === " ") {
            out += ch;
            continue;
          }
          if (Math.random() < dropRate) {
            out += Math.random() < 0.45 ? "\u2003\u2003" : "\u2003";
          } else {
            out += ch;
            kept += 1;
          }
        }

        if (kept < Math.max(2, Math.floor((token.length - 1) * 0.45))) {
          return token;
        }

        return out.endsWith(" ") ? out : `${out} `;
      };

      const buildFillText = (label, wrapChars, minChars, dropRate = 0) => {
        const token = `${label} `;
        const safeWrap = Math.max(0, Math.min(wrapChars, token.length - 1));
        const lead = safeWrap > 0 ? token.slice(token.length - safeWrap) : token;
        let out = lead;

        while (out.length < minChars) {
          out += buildNoisyToken(token, dropRate);
        }

        return out + token;
      };

      const fillRowWithCharOpacity = (row, text) => {
        const frag = document.createDocumentFragment();
        for (let i = 0; i < text.length; i += 1) {
          const ch = text[i];
          const span = document.createElement("span");
          span.className = "hero-fill-char";
          span.textContent = ch === " " ? "\u00A0" : ch;

          if (!/\s/.test(ch)) {
            const charOpacity = prefersReducedMotion ? "0.62" : (0.18 + Math.random() * 0.82).toFixed(2);
            span.style.setProperty("--hero-char-opacity", charOpacity);
          }

          frag.appendChild(span);
        }
        row.appendChild(frag);
      };

      const resetState = () => {
        items.forEach((item) => {
          item.classList.remove("is-flashing", "is-erasing", "is-fill-typing");
          item.style.removeProperty("--erase-delay");
          item.style.removeProperty("--fill-delay");
          item.style.removeProperty("--fill-duration");
          item.style.removeProperty("--fill-shift");
        });
      };

      const lockInteraction = () => {
        if (isLocked) return;
        isLocked = true;
        document.body.classList.add("works-anim-lock");
        interactionLock?.classList.add("is-active");
        if (!keyBlockBound) {
          window.addEventListener("keydown", blockInput, { capture: true });
          window.addEventListener("wheel", blockInput, { passive: false, capture: true });
          window.addEventListener("touchmove", blockInput, { passive: false, capture: true });
          keyBlockBound = true;
        }
      };

      const unlockInteraction = () => {
        if (!isLocked) return;
        isLocked = false;
        document.body.classList.remove("works-anim-lock");
        interactionLock?.classList.remove("is-active");
        if (keyBlockBound) {
          window.removeEventListener("keydown", blockInput, { capture: true });
          window.removeEventListener("wheel", blockInput, { capture: true });
          window.removeEventListener("touchmove", blockInput, { capture: true });
          keyBlockBound = false;
        }
      };

      const runHeroFill = (label, baseDelay) => {
        if (!heroVisual || !heroFillLayer) return;

        heroFillLayer.textContent = "";

        const layerRect = heroFillLayer.getBoundingClientRect();
        const sampleTitle = items[0]?.querySelector(".works-item-title");
        const sampleStyle = sampleTitle ? window.getComputedStyle(sampleTitle) : null;
        const baseFont = sampleStyle ? parseFloat(sampleStyle.fontSize) || 72 : 72;
        const rowFont = Math.max(18, baseFont);
        const rowHeight = Math.max(20, Math.floor(rowFont * 0.84));
        const rowCount = Math.max(2, Math.ceil(layerRect.height / rowHeight));
        heroFillLayer.style.setProperty("--hero-row-count", String(rowCount));

        let maxEnd = 0;

        for (let i = 0; i < rowCount; i += 1) {
          const row = document.createElement("span");
          row.className = "hero-fill-row";

          const shiftMax = Math.max(2, Math.floor(label.length * 0.66));
          const shiftChars = prefersReducedMotion ? 0 : Math.floor(Math.random() * (shiftMax + 1));
          const wrapChars = shiftChars + 2 + (prefersReducedMotion ? 0 : Math.floor(Math.random() * Math.max(1, label.length - 1)));
          const minChars = estimateChars(layerRect.width, rowFont) * 3 + label.length * 8;
          const rowText = buildFillText(label, wrapChars, minChars, prefersReducedMotion ? 0 : 0.42);

          const rowDelay = baseDelay + i * heroTypingStagger + Math.floor(Math.random() * heroTypingRandomDelayRange);
          const rowDuration = heroTypingDurationBase + Math.floor(Math.random() * heroTypingDurationRange);
          maxEnd = Math.max(maxEnd, rowDelay + rowDuration);

          row.style.fontSize = `${rowFont}px`;
          row.style.setProperty("--hero-shift", `-${shiftChars}ch`);
          row.style.setProperty("--hero-fill-delay", `${rowDelay}ms`);
          row.style.setProperty("--hero-fill-duration", `${rowDuration}ms`);
          fillRowWithCharOpacity(row, rowText);

          heroFillLayer.appendChild(row);
        }

        void heroFillLayer.offsetWidth;
        heroFillLayer.querySelectorAll(".hero-fill-row").forEach((row) => {
          row.classList.add("is-run");
        });

        return maxEnd;
      };

      const runBlackout = () => {
        if (!blackoutLayer) return;
        blackoutLayer.classList.remove("is-leave");
        blackoutLayer.classList.remove("is-run");
        void blackoutLayer.offsetWidth;
        blackoutLayer.classList.add("is-run");
      };

      const hideBlackout = () => {
        if (!blackoutLayer) return;
        blackoutLayer.classList.remove("is-run");
        blackoutLayer.classList.add("is-leave");
      };

      items.forEach((item) => {
        item.setAttribute("role", "button");
        item.setAttribute("tabindex", "0");

        const fill = document.createElement("span");
        fill.className = "works-item-fill";
        fill.setAttribute("aria-hidden", "true");

        const fillTrack = document.createElement("span");
        fillTrack.className = "works-item-fill-track";

        fill.appendChild(fillTrack);
        item.appendChild(fill);
      });

      const runAnimation = (clickedIndex) => {
        if (animating || clickedIndex < 0 || clickedIndex >= items.length) return;

        const clickedItem = items[clickedIndex];
        const clickedTitle = clickedItem.querySelector(".works-item-title");
        if (!clickedTitle) return;

        animating = true;
        clearTimers();
        resetState();

        const label = (clickedTitle.textContent || "").trim();
        const flashDuration = prefersReducedMotion ? 0 : 180;
        const eraseBase = prefersReducedMotion ? 0 : 26;
        const eraseStep = prefersReducedMotion ? 0 : 56;
        const eraseAnimDuration = prefersReducedMotion ? 0 : 160;
        const fillAfterEraseGap = prefersReducedMotion ? 0 : 4;
        const fillBase = 0;
        const heroBase = fillBase;
        const entranceAfterHeroStart = prefersReducedMotion ? 0 : 64;
        lockInteraction();

        items.forEach((item, index) => {
          const fillTrack = item.querySelector(".works-item-fill-track");
          const titleEl = item.querySelector(".works-item-title");
          const titleStyle = titleEl ? window.getComputedStyle(titleEl) : null;
          const fontPx = titleStyle ? parseFloat(titleStyle.fontSize) || 72 : 72;
          const widthPx = item.clientWidth || shell.clientWidth || window.innerWidth;

          const shiftMax = Math.max(2, Math.floor(label.length * 0.45));
          const shiftChars = prefersReducedMotion ? 0 : Math.floor(Math.random() * (shiftMax + 1));
          const wrapChars = shiftChars + 2 + (prefersReducedMotion ? 0 : Math.floor(Math.random() * Math.max(1, label.length - 1)));
          const minChars = estimateChars(widthPx, fontPx) * 6 + label.length * 20;
          const fillText = buildFillText(label, wrapChars, minChars, 0);
          if (fillTrack) fillTrack.textContent = fillText;

          const eraseDistance = Math.abs(index - clickedIndex);
          const eraseDelay = eraseBase + eraseDistance * eraseStep;
          const randomDelay = Math.floor(Math.random() * worksTypingRandomDelayRange);
          const fillDelay = Math.max(
            fillBase + index * worksTypingStagger + randomDelay,
            eraseDelay + eraseAnimDuration + fillAfterEraseGap
          );
          const fillDuration = worksTypingDurationBase + Math.floor(Math.random() * worksTypingDurationRange);
          const fillShift = prefersReducedMotion ? "0" : String(shiftChars);

          item.style.setProperty("--fill-delay", `${fillDelay}ms`);
          item.style.setProperty("--fill-duration", `${fillDuration}ms`);
          item.style.setProperty("--fill-shift", `-${fillShift}ch`);

          item.style.setProperty("--erase-delay", `${eraseDelay}ms`);
        });

        clickedItem.classList.add("is-flashing");
        pushTimer(() => {
          clickedItem.classList.remove("is-flashing");
        }, flashDuration + 10);

        items.forEach((item) => item.classList.add("is-erasing"));
        runHeroFill(label, heroBase);

        void shell.offsetWidth;
        items.forEach((item) => item.classList.add("is-fill-typing"));

        pushTimer(() => {
          runBlackout();
          if (prefersReducedMotion || !blackoutLayer) {
            unlockInteraction();
            animating = false;
            return;
          }

          const handleBlackoutEnd = () => {
            blackoutLayer.removeEventListener("animationend", handleBlackoutEnd);
            unlockInteraction();
            animating = false;
          };
          blackoutLayer.addEventListener("animationend", handleBlackoutEnd);
        }, entranceAfterHeroStart);
      };

      blackoutBack?.addEventListener("click", () => {
        hideBlackout();
        heroFillLayer.textContent = "";
        resetState();
        unlockInteraction();
        animating = false;
        if (blackoutLayer) {
          const handleLeaveEnd = () => {
            blackoutLayer.removeEventListener("animationend", handleLeaveEnd);
            blackoutLayer.classList.remove("is-leave");
          };
          blackoutLayer.addEventListener("animationend", handleLeaveEnd);
        }
      });

      items.forEach((item, index) => {
        item.addEventListener("click", () => runAnimation(index));
        item.addEventListener("keydown", (event) => {
          if (event.key !== "Enter" && event.key !== " ") return;
          event.preventDefault();
          runAnimation(index);
        });
      });
    })();

    (function () {
      const mark = document.querySelector(".studio-mark");
      if (!mark) return;

      const text = mark.textContent || "";
      const chars = [];
      const frag = document.createDocumentFragment();

      for (let i = 0; i < text.length; i += 1) {
        const ch = text[i];
        const span = document.createElement("span");
        span.className = ch === " " ? "mark-char mark-space" : "mark-char";
        span.style.setProperty("--char-index", String(i));
        span.textContent = ch === " " ? "\u00A0" : ch;
        chars.push(span);
        frag.appendChild(span);
      }

      mark.textContent = "";
      mark.appendChild(frag);

      const fontClasses = ["font-a", "font-b", "font-c", "font-d"];
      const staggerStep = 36;
      const cycleGap = 1300;

      const runCycle = () => {
        chars.forEach((charEl, index) => {
          if (charEl.classList.contains("mark-space")) return;
          window.setTimeout(() => {
            charEl.classList.remove("font-a", "font-b", "font-c", "font-d");
            const fontClass = fontClasses[Math.floor(Math.random() * fontClasses.length)];
            charEl.classList.add(fontClass);
          }, index * staggerStep);
        });
      };

      runCycle();
      window.setInterval(runCycle, cycleGap);
    })();

    (function () {
      const visual = document.querySelector(".hero-visual");
      const svg = document.querySelector(".hero-logo-svg");
      const typerLayer = document.querySelector(".typer-layer");
      if (!visual || !svg) return;

      const blocks = Array.from(svg.querySelectorAll(".floating-block"));
      if (blocks.length === 0) return;

      const prefersReducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      if (prefersReducedMotion) return;

      const supportsFinePointer = window.matchMedia("(hover: hover) and (pointer: fine)").matches;

      const states = blocks.map((el, index) => ({
        el,
        index,
        x: 0,
        y: 0,
        r: 0,
        vx: 0,
        vy: 0,
        vr: 0,
        cx: 0,
        cy: 0,
        radius: 0,
        fx: 0.22 + index * 0.027,
        fy: 0.18 + index * 0.023,
        fr: 0.14 + index * 0.019,
        ax: 12 + (index % 3) * 5,
        ay: 8 + (index % 2) * 4,
        ar: 0.55 + (index % 4) * 0.12,
        px: index * 0.93,
        py: index * 1.27,
        pr: index * 0.61,
        floorY: 0,
        s: 1,
        vs: 0,
        targetS: 1,
        scaleTimer: 0,
        clicks: 0,
        isDropped: false,
        dropThreshold: Math.floor(Math.random() * 10) + 1
      }));
      const stateByEl = new Map(states.map((state) => [state.el, state]));
      const viewBox = svg.viewBox.baseVal;
      const typeText = "© 2026 nerdtechno";
      const snakes = [];
      let spawnTimer = 0;
      const maxActiveSnakes = 1;

      const refreshBounds = () => {
        const viewHeight = svg.viewBox.baseVal.height || 2713;
        const floorPadding = 28;

        states.forEach((state) => {
          const box = state.el.getBBox();
          state.boxX = box.x;
          state.boxY = box.y;
          state.boxW = box.width;
          state.boxH = box.height;
          state.cx = box.x + box.width * 0.5;
          state.cy = box.y + box.height * 0.5;
          state.radius = Math.max(box.width, box.height) * 0.5;
          state.floorY = viewHeight - floorPadding - (box.y + box.height);

          const shape = state.el.querySelector("path, circle, rect, polygon");
          if (!shape) {
            state.track = null;
            return;
          }

          if (shape instanceof SVGPathElement) {
            const len = shape.getTotalLength();
            const samples = [];
            const sampleCount = 80;
            for (let i = 0; i < sampleCount; i += 1) {
              const p = shape.getPointAtLength((len * i) / sampleCount);
              samples.push(p);
            }

            let area = 0;
            for (let i = 0; i < samples.length; i += 1) {
              const a = samples[i];
              const b = samples[(i + 1) % samples.length];
              area += a.x * b.y - b.x * a.y;
            }

            state.track = {
              kind: "path",
              shape,
              length: len,
              orientation: area >= 0 ? 1 : -1
            };
            return;
          }

          if (shape instanceof SVGCircleElement) {
            const cx = Number(shape.getAttribute("cx") || 0);
            const cy = Number(shape.getAttribute("cy") || 0);
            const r = Number(shape.getAttribute("r") || 1);
            state.track = {
              kind: "circle",
              cx,
              cy,
              r,
              length: Math.PI * 2 * r,
              orientation: 1
            };
            return;
          }

          state.track = null;
        });
      };

      const toSvgPoint = (clientX, clientY) => {
        const matrix = svg.getScreenCTM();
        if (!matrix) return null;
        const point = new DOMPoint(clientX, clientY).matrixTransform(matrix.inverse());
        return point;
      };

      const applyPointerImpulse = (clientX, clientY) => {
        const point = toSvgPoint(clientX, clientY);
        if (!point) return;

        states.forEach((state) => {
          if (state.isDropped) return;
          const dx = state.cx - point.x;
          const dy = state.cy - point.y;
          const dist = Math.hypot(dx, dy) || 1;
          const reach = state.radius + 920;
          if (dist >= reach) return;

          const t = 1 - dist / reach;
          const nx = dx / dist;
          const ny = dy / dist;
          const impulse = t * 0.62;

          state.vx += nx * impulse;
          state.vy += ny * impulse;
          state.vr += (nx * 0.18 - ny * 0.1) * t;
        });
      };

      const triggerScale = (state) => {
        state.targetS = 1.12;
        window.clearTimeout(state.scaleTimer);
        state.scaleTimer = window.setTimeout(() => {
          state.targetS = 1;
        }, 170);
      };

      const dropState = (state) => {
        state.isDropped = true;
        state.vy += 0.8 + Math.random() * 0.6;
        state.vx += (Math.random() - 0.5) * 1.2;
        state.vr += (Math.random() - 0.5) * 0.7;
      };

      const svgToLayer = (sx, sy) => {
        const svgRect = svg.getBoundingClientRect();
        const layerRect = typerLayer ? typerLayer.getBoundingClientRect() : svgRect;
        const x = ((sx - viewBox.x) / viewBox.width) * svgRect.width + (svgRect.left - layerRect.left);
        const y = ((sy - viewBox.y) / viewBox.height) * svgRect.height + (svgRect.top - layerRect.top);
        return { x, y };
      };

      const sampleTrack = (track, lengthPos) => {
        if (!track) return null;

        if (track.kind === "path") {
          const len = track.length;
          const s = ((lengthPos % len) + len) % len;
          const eps = Math.max(2, Math.min(12, len / 240));
          const p = track.shape.getPointAtLength(s);
          const p1 = track.shape.getPointAtLength(((s + eps) % len + len) % len);
          const tx = p1.x - p.x;
          const ty = p1.y - p.y;
          const tlen = Math.hypot(tx, ty) || 1;
          const ux = tx / tlen;
          const uy = ty / tlen;
          const leftNx = -uy;
          const leftNy = ux;
          const outwardX = track.orientation > 0 ? uy : leftNx;
          const outwardY = track.orientation > 0 ? -ux : leftNy;
          return { x: p.x, y: p.y, nx: outwardX, ny: outwardY, tx: ux, ty: uy };
        }

        if (track.kind === "circle") {
          const s = ((lengthPos % track.length) + track.length) % track.length;
          const a = (s / track.length) * Math.PI * 2;
          const cosA = Math.cos(a);
          const sinA = Math.sin(a);
          return { x: track.cx + cosA * track.r, y: track.cy + sinA * track.r, nx: cosA, ny: sinA, tx: -sinA, ty: cosA };
        }

        return null;
      };

      const createSnake = () => {
        if (!typerLayer) return;
        if (snakes.length >= maxActiveSnakes) return;
        const candidates = states.filter((state) => !state.isDropped && state.track);
        if (candidates.length === 0) return;

        const state = candidates[Math.floor(Math.random() * candidates.length)];
        const wrapper = document.createElement("div");
        wrapper.className = "typer-snake";
        typerLayer.appendChild(wrapper);

        const chars = typeText.split("").map((ch) => {
          const span = document.createElement("span");
          span.className = "typer-char";
          span.textContent = ch === " " ? "\u00A0" : ch;
          wrapper.appendChild(span);
          return span;
        });

        const firstChar = chars[0];
        const fontSizePx = firstChar ? parseFloat(window.getComputedStyle(firstChar).fontSize || "14") : 14;
        const svgRect = svg.getBoundingClientRect();
        const viewUnitsPerPx = svgRect.width > 0 ? viewBox.width / svgRect.width : 1;
        const charSpacing = fontSizePx * 0.62 * viewUnitsPerPx;
        const fontSizeView = fontSizePx * viewUnitsPerPx;

        snakes.push({
          state,
          wrapper,
          chars,
          pathPos: Math.random() * state.track.length - (chars.length * charSpacing) / 2,
          speed: 12 + Math.random() * 8,
          spacing: charSpacing,
          // Keep glyphs outside the shape by offsetting roughly one glyph height outward.
          offset: fontSizeView * (0.2 + Math.random() * 0.2),
          typed: 0,
          phase: "in",
          holdUntil: 0
        });
      };

      const scheduleTypedTag = () => {
        createSnake();
        spawnTimer = window.setTimeout(scheduleTypedTag, 2800 + Math.random() * 2200);
      };

      const updateSnakes = (dtMs, nowMs) => {
        const dt = dtMs / 1000;

        for (let i = snakes.length - 1; i >= 0; i -= 1) {
          const snake = snakes[i];
          const state = snake.state;
          if (!state.track || state.isDropped) {
            snake.wrapper.remove();
            snakes.splice(i, 1);
            continue;
          }

          snake.pathPos += snake.speed * dt;
          if (snake.phase === "in") {
            snake.typed += dtMs / 118;
            if (snake.typed >= snake.chars.length) {
              snake.typed = snake.chars.length;
              snake.phase = "hold";
              snake.holdUntil = nowMs + 2200 + Math.random() * 1800;
            }
          } else if (snake.phase === "hold") {
            if (nowMs >= snake.holdUntil) snake.phase = "out";
          } else if (snake.phase === "out") {
            snake.typed -= dtMs / 118;
            if (snake.typed <= 0) {
              snake.wrapper.remove();
              snakes.splice(i, 1);
              continue;
            }
          }

          const visible = Math.max(0, Math.min(snake.chars.length, Math.floor(snake.typed)));
          const isOutPhase = snake.phase === "out";
          const visibleStart = isOutPhase ? snake.chars.length - visible : 0;
          const visibleEnd = isOutPhase ? snake.chars.length : visible;
          snake.wrapper.style.opacity = "1";

          for (let c = 0; c < snake.chars.length; c += 1) {
            const charEl = snake.chars[c];
            if (c < visibleStart || c >= visibleEnd) {
              charEl.style.opacity = "0";
              continue;
            }

            const sample = sampleTrack(state.track, snake.pathPos + c * snake.spacing);
            if (!sample) {
              charEl.style.opacity = "0";
              continue;
            }

            const rad = (state.r * Math.PI) / 180;
            const cosR = Math.cos(rad);
            const sinR = Math.sin(rad);

            const localDx = (sample.x - state.cx) * state.s;
            const localDy = (sample.y - state.cy) * state.s;
            const tx = state.cx + localDx * cosR - localDy * sinR + state.x;
            const ty = state.cy + localDx * sinR + localDy * cosR + state.y;

            let nx = sample.nx * cosR - sample.ny * sinR;
            let ny = sample.nx * sinR + sample.ny * cosR;

            const sx = tx + nx * snake.offset * state.s;
            const sy = ty + ny * snake.offset * state.s;
            const pos = svgToLayer(sx, sy);
            // Rotate each glyph so its "top" points to the outward normal direction.
            const angle = (Math.atan2(ny, nx) * 180) / Math.PI + 90;
            charEl.style.opacity = "1";
            charEl.style.left = `${pos.x.toFixed(2)}px`;
            charEl.style.top = `${pos.y.toFixed(2)}px`;
            charEl.style.transform = `translate(-50%, -50%) rotate(${angle.toFixed(2)}deg)`;
          }
        }
      };

      const start = performance.now();
      const spring = 0.037;
      const springR = 0.032;
      const damping = 0.9;
      const dampingR = 0.88;
      const gravity = 0.82;
      const bounce = 0.26;
      const floorFriction = 0.86;
      let prevNow = performance.now();

      const animate = (now) => {
        const time = (now - start) * 0.001;
        const dtMs = Math.min(40, now - prevNow);
        prevNow = now;

        states.forEach((state) => {
          if (!state.isDropped) {
            const targetX = Math.sin(time * state.fx + state.px) * state.ax;
            const targetY = Math.cos(time * state.fy + state.py) * state.ay;
            const targetR = Math.sin(time * state.fr + state.pr) * state.ar;

            state.vx += (targetX - state.x) * spring;
            state.vy += (targetY - state.y) * spring;
            state.vr += (targetR - state.r) * springR;

            state.vx *= damping;
            state.vy *= damping;
            state.vr *= dampingR;

            state.x += state.vx;
            state.y += state.vy;
            state.r += state.vr;
          } else {
            state.vy += gravity;
            state.vx *= 0.996;
            state.vr *= 0.992;

            state.x += state.vx;
            state.y += state.vy;
            state.r += state.vr;

            if (state.y > state.floorY) {
              state.y = state.floorY;
              if (Math.abs(state.vy) > 0.18) {
                state.vy *= -bounce;
                state.vx *= floorFriction;
                state.vr *= 0.9;
              } else {
                state.vy = 0;
                state.vx *= 0.9;
                if (Math.abs(state.vx) < 0.02) state.vx = 0;
                if (Math.abs(state.vr) < 0.02) state.vr = 0;
              }
            }
          }

          state.vs += (state.targetS - state.s) * 0.24;
          state.vs *= 0.72;
          state.s += state.vs;

          state.el.style.transform = `translate(${state.x.toFixed(2)}px, ${state.y.toFixed(2)}px) rotate(${state.r.toFixed(2)}deg) scale(${state.s.toFixed(3)})`;
        });

        updateSnakes(dtMs, now);

        window.requestAnimationFrame(animate);
      };

      refreshBounds();
      window.addEventListener("resize", refreshBounds);

      if (supportsFinePointer) {
        visual.addEventListener("pointerenter", (event) => {
          applyPointerImpulse(event.clientX, event.clientY);
        });

        visual.addEventListener("pointermove", (event) => {
          applyPointerImpulse(event.clientX, event.clientY);
        }, { passive: true });
      }

      scheduleTypedTag();

      visual.addEventListener("click", (event) => {
        if (!(event.target instanceof Element)) return;
        const blockEl = event.target.closest(".floating-block");
        if (!blockEl) return;

          const state = stateByEl.get(blockEl);
          if (!state) return;

          triggerScale(state);
          if (!state.isDropped) {
            state.vy -= 0.55;
            state.vr += (Math.random() - 0.5) * 0.45;
          }

          state.clicks += 1;
          if (state.clicks >= state.dropThreshold && !state.isDropped) {
            dropState(state);
          }
      });

      window.requestAnimationFrame(animate);
    })();

  </script>
</body>
</html>
